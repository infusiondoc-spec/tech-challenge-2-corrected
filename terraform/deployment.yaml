apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: hello-world-app

  template:
    metadata:
      labels:
        app: hello-world-app

    spec:
      containers:
      - name: hello-world-app
        image: 891377228691.dkr.ecr.us-east-2.amazonaws.com/hello-world-app:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 80